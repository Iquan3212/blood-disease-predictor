<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blood Disease Prediction</title>

<link rel="stylesheet" href="/static/css/style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#eef2f3,#dfe9f3);
font-family: Arial;
}

.card{
border-radius:15px;
box-shadow:0px 8px 20px rgba(0,0,0,0.1);
}

.header-title{
font-weight:bold;
color:#2c3e50;
}

.predict-btn{
background:#0d6efd;
border:none;
padding:10px 30px;
}

</style>

</head>

<body>

<a href="/history" class="btn btn-secondary mb-3">
View Prediction History
</a>

<div class="container mt-4">

<div class="d-flex justify-content-between align-items-center mb-3">

<h4>AI Blood Disease Prediction</h4>

<a href="/logout" class="btn btn-danger">
Logout
</a>

</div>

</div>

<div class="container mt-5">

<div class="text-center mb-4">
<h1 class="header-title">AI Blood Disease Prediction</h1>
<p class="text-muted">Enter blood test parameters to predict possible disease</p>
</div>

<div class="row justify-content-center">

<div class="col-md-8">

<div class="card p-4">

<form action="/predict" method="POST">

<div class="row g-3">

<div class="col-md-6">
<label class="form-label">Hemoglobin</label>
<input type="number" step="any" name="hemoglobin" class="form-control" required>
</div>

<div class="col-md-6">
<label class="form-label">RBC</label>
<input type="number" step="any" name="rbc" class="form-control" required>
</div>

<div class="col-md-6">
<label class="form-label">Platelets</label>
<input type="number" step="any" name="platelets" class="form-control" required>
</div>

<div class="col-md-6">
<label class="form-label">MCV</label>
<input type="number" step="any" name="mcv" class="form-control" required>
</div>

<div class="col-md-6">
<label class="form-label">MCH</label>
<input type="number" step="any" name="mch" class="form-control" required>
</div>

<div class="col-md-6">
<label class="form-label">MCHC</label>
<input type="number" step="any" name="mchc" class="form-control" required>
</div>

<div class="col-md-6">
<label class="form-label">PDW</label>
<input type="number" step="any" name="pdw" class="form-control" required>
</div>

</div>

<div class="text-center mt-4">

<button type="submit" class="btn btn-primary predict-btn">
Predict Disease
</button>

</div>

</form>

</div>

</div>

</div>

</div>

</body>
</html>
