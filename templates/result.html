<!DOCTYPE html>
<html>
<head>

<title>Prediction Result</title>

<link rel="stylesheet" href="/static/css/style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
font-family:Arial, Helvetica, sans-serif;
}

.result-card{
margin-top:60px;
border-radius:15px;
box-shadow:0px 8px 20px rgba(0,0,0,0.1);
}

.chart-container{
margin-top:30px;
margin-bottom:30px;
}

canvas{
max-height:350px;
}

.info-section{
text-align:left;
margin-top:25px;
}

</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-md-9">

<div class="card result-card p-4 text-center">

<h2 class="mb-3">Prediction Result</h2>

<h3 class="text-danger">{{ prediction }}</h3>


<div class="chart-container">

<h5 class="mb-3">Blood Test Visualization</h5>

<canvas id="bloodChart"></canvas>

</div>

<div class="info-section">

<h4>About the Condition</h4>
<p>{{ description }}</p>

</div>

<div class="info-section">

<h4>Why the Model Predicted This</h4>
<p>{{ reason }}</p>

</div>

<div class="info-section">

<h4>Recommended Precautions</h4>

<ul>

{% if precautions %}
{% for item in precautions %}
<li>{{ item }}</li>
{% endfor %}
{% endif %}

</ul>

</div>

<div class="d-flex justify-content-center gap-3 mt-4">

<a href="/" class="btn btn-primary px-4">
Predict Again
</a>

<a href="/history" class="btn btn-secondary px-4">
View History
</a>

</div>

</div>

</div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="/static/js/charts.js"></script>

<script>

const bloodData = {{ blood_values | tojson | safe }};

if (bloodData){
    renderBloodChart(bloodData);
}

</script>

</body>
</html>
